name: Actualizador de P2P Bybit y Yadio

on:
  schedule:
    - cron: '*/18 9-23,0-4 * * *'
  workflow_dispatch:

jobs:
  actualizar-p2p:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar Librerías
        run: |
          python -m pip install --upgrade pip
          pip install requests pyDolarVenezuela

      - name: Correr Script P2P
        run: python Tasasapp.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Actualización forzada de tasas" || echo "No hay cambios"
          git push origin main
