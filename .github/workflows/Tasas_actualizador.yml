name: Actualizador de P2P Bybit y Yadio

on:
  schedule:
    # Corre cada 18 minutos en el horario activo de Venezuela
    - cron: '*/18 9-23,0-4 * * *'
  workflow_dispatch: 

jobs:
  actualizar-p2p:
    runs-on: ubuntu-latest
    # --- INSERTAR ESTAS LÍNEAS ---
    permissions:
      contents: write
    # ----------------------------
    steps:
      - name: Descargar código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.9'

      - name: Instalar Requests
        run: pip install requests
      
      - name: Correr Script P2P
        run: python Tasasapp.py
        
       - name: Instalar Librerías
        run: |
          python -m pip install --upgrade pip
          pip install requests pyDolarVenezuela
          
       - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add tasas.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Bybit y Yadio actualizados" && git push)
